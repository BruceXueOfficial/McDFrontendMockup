<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>教练反馈 H5</title>
  <style>
    :root {
      --bg: #f6f2e8;
      --card: #ffffff;
      --line: rgba(41, 41, 41, 0.08);
      --text: #292929;
      --muted: #6b6b6b;
      --yellow: #ffbc0d;
      --red: #da291c;
      --shadow: 0 16px 40px rgba(41, 41, 41, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 188, 13, 0.32), transparent 28%),
        radial-gradient(circle at bottom right, rgba(218, 41, 28, 0.12), transparent 30%),
        linear-gradient(180deg, #fbf7ef 0%, #f3ede0 100%);
      padding: 24px 16px 40px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #292929 0%, #4a4030 100%);
      color: #fff;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: 30px;
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card strong {
      display: block;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .button-primary {
      background: var(--yellow);
      color: #292929;
    }

    .button-secondary {
      background: rgba(41, 41, 41, 0.06);
      color: var(--text);
    }

    .tip {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(41, 41, 41, 0.06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="eyebrow">GitHub Pages</span>
      <h1>教练反馈 H5</h1>
      <p>手机直接打开下面的链接即可查看。为了便于分享，我把三个方案都放成了单独页面，并保留一个总入口页。</p>
    </section>

    <section class="grid">
      <article class="card">
        <strong>方案 1: 不展示 Tips</strong>
        <p>适合快速对比无提示场景的输入框表现。</p>
        <div class="actions">
          <a class="button button-primary" href="./option-1.html">打开页面</a>
        </div>
      </article>

      <article class="card">
        <strong>方案 2: 展示 SIBA 提示</strong>
        <p>包含 SIBA 反馈说明，适合移动端直接预览完整提示效果。</p>
        <div class="actions">
          <a class="button button-primary" href="./option-2.html">打开页面</a>
        </div>
      </article>

      <article class="card">
        <strong>方案 3: Tab 切换反馈</strong>
        <p>适合查看切换交互下的反馈体验和信息层级。</p>
        <div class="actions">
          <a class="button button-primary" href="./option-3.html">打开页面</a>
        </div>
      </article>
    </section>

    <section class="tip">
      如果你后面还要继续改页面，我可以直接把新的 HTML 覆盖到这个仓库里，链接不用换。
    </section>
  </main>
</body>
</html>
